<!-- @dsCard group="画面モック(スマホ)" name="大会・リーグ戦星取表" viewport="390x844" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F4F7F5;--ink:#14211C;--muted:#5F6E67;--line:#E2EAE5;--primary:#0E7C63;--primary-d:#0A5C4A;--accent:#D8EC3F;--navy:#122B33;--amber:#E8A93C}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--ink);width:390px;height:844px;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:18px 20px 6px}
header .back{width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
header h1{font-size:17px;font-weight:800}
.live{margin-left:auto;background:var(--accent);color:var(--navy);border-radius:999px;padding:5px 12px;font-size:11px;font-weight:800}
.tabs{display:flex;gap:8px;padding:10px 16px}
.tabs span{border-radius:999px;padding:8px 16px;font-size:13px;font-weight:800;background:#fff;border:1px solid var(--line);color:var(--muted)}
.tabs .on{background:var(--navy);border-color:var(--navy);color:#fff}
main{flex:1;overflow-y:auto;padding:4px 16px 20px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px}
h2{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{text-align:center;padding:8px 2px;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-size:10px;font-weight:800}
td.nm,th.nm{text-align:left;font-weight:800;font-size:12px;white-space:nowrap}
.win{color:var(--primary-d);font-weight:800}
.lose{color:#C4514A;font-weight:800}
.self{background:#F1F5F3;color:var(--muted)}
.rank{display:flex;align-items:center;gap:10px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:13px}
.rank:last-child{border-bottom:none}
.rank .no{width:26px;height:26px;border-radius:50%;background:#EDF4F1;color:var(--primary-d);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rank.first .no{background:var(--accent);color:var(--navy)}
.rank b{flex:1}
.rank small{color:var(--muted);font-variant-numeric:tabular-nums}
.rank .rec{font-weight:800;font-variant-numeric:tabular-nums}
</style>
</head>
<body>
<header>
  <div class="back">‹</div>
  <h1>7月度 交流リーグ</h1>
  <span class="live">開催中</span>
</header>
<div class="tabs"><span class="on">星取表</span><span>順位</span><span>試合一覧</span></div>
<main>
  <div class="card">
    <h2>星取表(総当たり)</h2>
    <table>
      <tr><th class="nm"></th><th>①</th><th>②</th><th>③</th><th>④</th><th>⑤</th></tr>
      <tr><td class="nm">① けんじ組</td><td class="self">—</td><td class="win">○<br>11-8</td><td class="win">○<br>11-6</td><td class="lose">●<br>9-11</td><td>7/26</td></tr>
      <tr><td class="nm">② さとし組</td><td class="lose">●</td><td class="self">—</td><td class="win">○<br>11-9</td><td>7/26</td><td class="win">○<br>11-4</td></tr>
      <tr><td class="nm">③ あき組</td><td class="lose">●</td><td class="lose">●</td><td class="self">—</td><td class="win">○<br>12-10</td><td>7/26</td></tr>
      <tr><td class="nm">④ なお組</td><td class="win">○</td><td>7/26</td><td class="lose">●</td><td class="self">—</td><td class="win">○<br>11-7</td></tr>
      <tr><td class="nm">⑤ ゆき組</td><td>7/26</td><td class="lose">●</td><td>7/26</td><td class="lose">●</td><td class="self">—</td></tr>
    </table>
  </div>
  <div class="card">
    <h2>現在の順位(勝数 → 得失点差)</h2>
    <div class="rank first"><span class="no">1</span><b>けんじ・ゆうた</b><span class="rec">2勝1敗</span><small>+6</small></div>
    <div class="rank"><span class="no">2</span><b>なお・れん</b><span class="rec">2勝1敗</span><small>+3</small></div>
    <div class="rank"><span class="no">3</span><b>さとし・まい</b><span class="rec">2勝1敗</span><small>+2</small></div>
    <div class="rank"><span class="no">4</span><b>あき・とも</b><span class="rec">1勝2敗</span><small>-4</small></div>
    <div class="rank"><span class="no">5</span><b>ゆき・こう</b><span class="rec">0勝3敗</span><small>-7</small></div>
  </div>
</main>
</body>
</html>
