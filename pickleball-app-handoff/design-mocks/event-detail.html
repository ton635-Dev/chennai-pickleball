<!-- @dsCard group="画面モック(スマホ)" name="活動日詳細・出欠登録" viewport="390x844" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F4F7F5;--surface:#fff;--ink:#14211C;--muted:#5F6E67;--line:#E2EAE5;--primary:#0E7C63;--primary-d:#0A5C4A;--accent:#D8EC3F;--navy:#122B33;--amber:#E8A93C;--gray:#9AA8A2}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--ink);width:390px;height:844px;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:18px 20px 12px}
header .back{width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px}
header h1{font-size:18px;font-weight:800}
main{flex:1;overflow-y:auto;padding:0 16px 16px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.date{font-size:24px;font-weight:800}
.inforow{display:flex;gap:10px;font-size:14px;padding:9px 0;border-bottom:1px solid var(--line);align-items:center}
.inforow:last-child{border-bottom:none}
.inforow .ic{width:22px;text-align:center}
.inforow a{color:var(--primary);font-weight:700;text-decoration:underline}
.inforow small{color:var(--muted)}
h2{font-size:14px;color:var(--muted);margin:2px 0 10px;font-weight:800}
.seg{display:flex;gap:8px}
.seg button{flex:1;border:2px solid var(--line);border-radius:14px;padding:14px 0;font-size:15px;font-weight:800;font-family:inherit;background:#fff;color:var(--muted)}
.seg .on{background:var(--primary);border-color:var(--primary);color:#fff}
.cmt{margin-top:12px;display:flex;gap:8px}
.cmt input{flex:1;border:1px solid var(--line);border-radius:12px;padding:11px 14px;font-size:13px;font-family:inherit;background:var(--bg)}
.cmt button{border:none;border-radius:12px;padding:0 18px;background:var(--navy);color:#fff;font-weight:800;font-family:inherit;font-size:13px}
.gtitle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;margin:14px 0 6px}
.gtitle .dot{width:9px;height:9px;border-radius:50%}
.p .dot{background:var(--primary)}.m .dot{background:var(--amber)}.n .dot{background:var(--gray)}
.p{color:var(--primary-d)}.m{color:#9A6B14}.n{color:var(--muted)}
.mem{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.mem:last-child{border-bottom:none}
.mem .av{width:32px;height:32px;border-radius:50%;background:#EDF4F1;color:var(--primary-d);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mem small{color:var(--muted);font-size:12px;margin-left:auto;text-align:right}
.wa{width:100%;border:none;border-radius:999px;padding:14px 0;font-size:15px;font-weight:800;font-family:inherit;background:var(--accent);color:var(--navy);margin-bottom:14px}
</style>
</head>
<body>
<header><div class="back">‹</div><h1>活動日詳細</h1></header>
<main>
  <div class="card">
    <div class="date">7/26 (土) 6:30 – 9:00</div>
    <div style="height:10px"></div>
    <div class="inforow"><span class="ic">📍</span><span><b>Marina Sports Arena</b>・屋外4面 <a>地図</a></span></div>
    <div class="inforow"><span class="ic">💰</span><span>参加費 ₹250 <small>(コート代割り勘)</small></span></div>
    <div class="inforow"><span class="ic">⏰</span><span>出欠締切 7/25 (金) 12:00</span></div>
    <div class="inforow"><span class="ic">📝</span><span>初心者歓迎!ボールはこちらで用意します</span></div>
  </div>

  <div class="card">
    <h2>あなたの出欠</h2>
    <div class="seg">
      <button class="on">参加</button>
      <button>未定</button>
      <button>不参加</button>
    </div>
    <div class="cmt">
      <input placeholder="コメント(例: 7時ごろ到着します)">
      <button>送信</button>
    </div>
  </div>

  <button class="wa">💬 参加者リストをWhatsAppに共有</button>

  <div class="card">
    <h2>参加者</h2>
    <div class="gtitle p"><span class="dot"></span>参加 12名</div>
    <div class="mem"><span class="av">け</span>けんじ<small>7時ごろ到着します</small></div>
    <div class="mem"><span class="av">ゆ</span>ゆうた</div>
    <div class="mem"><span class="av">さ</span>さとし<small>ボール持っていきます</small></div>
    <div class="mem"><span class="av">ま</span>まい</div>
    <div class="mem"><span class="av">+</span>ほか 8名</div>
    <div class="gtitle m"><span class="dot"></span>未定 3名</div>
    <div class="mem"><span class="av">あ</span>あき<small>仕事次第で…</small></div>
    <div class="mem"><span class="av">+</span>ほか 2名</div>
    <div class="gtitle n"><span class="dot"></span>不参加 2名</div>
    <div class="mem"><span class="av">と</span>とも</div>
    <div class="mem"><span class="av">り</span>りな</div>
  </div>
</main>
</body>
</html>
