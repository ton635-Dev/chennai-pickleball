<!-- @dsCard group="画面モック(スマホ)" name="コート詳細・項目別評価" viewport="390x844" -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F4F7F5;--ink:#14211C;--muted:#5F6E67;--line:#E2EAE5;--primary:#0E7C63;--primary-d:#0A5C4A;--accent:#D8EC3F;--navy:#122B33;--amber:#E8A93C}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--ink);width:390px;height:844px;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:18px 20px 10px}
header .back{width:34px;height:34px;border-radius:50%;background:#fff;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px}
header h1{font-size:18px;font-weight:800}
main{flex:1;overflow-y:auto;padding:0 16px 16px}
.photo{height:150px;border-radius:16px;background:linear-gradient(140deg,#0E7C63 0%,#0A5C4A 55%,#122B33 100%);position:relative;margin-bottom:12px;display:flex;align-items:flex-end;padding:14px;color:#fff}
.photo .nm{font-size:20px;font-weight:800}
.photo .tag{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.92);color:var(--ink);border-radius:999px;padding:5px 12px;font-size:11px;font-weight:800}
.photo .cnt{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.4);border-radius:999px;padding:5px 10px;font-size:11px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
h2{font-size:13px;color:var(--muted);font-weight:800;margin-bottom:10px}
.spec{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;font-size:13px}
.spec div{display:flex;gap:7px;align-items:baseline}
.spec b{color:var(--muted);font-size:11px;flex-shrink:0}
.rate{display:flex;align-items:center;gap:10px;padding:7px 0}
.rate .l{width:96px;font-size:13px;font-weight:800;flex-shrink:0}
.rate .bar{flex:1;height:8px;border-radius:4px;background:#EDF1EF;overflow:hidden}
.rate .bar i{display:block;height:100%;border-radius:4px;background:var(--primary)}
.rate .v{width:52px;font-size:12px;text-align:right;font-weight:800;color:var(--primary-d);font-variant-numeric:tabular-nums}
.cmtx{border-top:1px solid var(--line);padding:10px 0 4px;font-size:13px}
.cmtx b{font-size:12px}
.cmtx small{color:var(--muted);font-size:11px}
.cmtx p{margin-top:3px;color:#333;line-height:1.55}
.rateBtn{width:100%;border:none;border-radius:999px;padding:14px 0;font-size:15px;font-weight:800;font-family:inherit;background:var(--primary);color:#fff}
</style>
</head>
<body>
<header><div class="back">‹</div><h1>コート詳細</h1></header>
<main>
  <div class="photo">
    <span class="tag">屋外・ハードコート</span>
    <span class="cnt">📷 5枚</span>
    <div class="nm">Marina Sports Arena</div>
  </div>

  <div class="card">
    <h2>基本情報</h2>
    <div class="spec">
      <div><b>面数</b>4面(ネット常設)</div>
      <div><b>照明</b>ナイター可</div>
      <div><b>料金</b>₹500 / 時間</div>
      <div><b>予約</b>電話(前日まで)</div>
      <div><b>駐車場</b>あり(無料)</div>
      <div><b>更衣室</b>なし</div>
    </div>
    <div style="margin-top:10px;font-size:13px;color:var(--primary);font-weight:700;text-decoration:underline">📍 Googleマップで開く</div>
  </div>

  <div class="card">
    <h2>みんなの評価(8名)</h2>
    <div class="rate"><span class="l">コート数</span><span class="bar"><i style="width:84%"></i></span><span class="v">4.2 ★</span></div>
    <div class="rate"><span class="l">路面(滑りにくさ)</span><span class="bar"><i style="width:76%"></i></span><span class="v">3.8 ★</span></div>
    <div class="rate"><span class="l">広さ</span><span class="bar"><i style="width:90%"></i></span><span class="v">4.5 ★</span></div>
    <div class="rate"><span class="l">設備</span><span class="bar"><i style="width:70%"></i></span><span class="v">3.5 ★</span></div>
    <div class="rate"><span class="l">アクセス</span><span class="bar"><i style="width:80%"></i></span><span class="v">4.0 ★</span></div>
    <div style="height:8px"></div>
    <div class="cmtx"><b>ゆうた</b> <small>・路面 3★・7/12</small><p>雨上がりは端のコートが滑りやすいので注意。中央2面がおすすめ。</p></div>
    <div class="cmtx"><b>まい</b> <small>・アクセス 4★・7/5</small><p>朝6時台は道が空いていて中心部から20分ほど。駐車場も余裕あり。</p></div>
  </div>

  <button class="rateBtn">このコートを評価する</button>
</main>
</body>
</html>
