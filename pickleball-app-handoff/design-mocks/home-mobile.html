<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F4F7F5;--surface:#fff;--ink:#14211C;--muted:#5F6E67;--line:#E2EAE5;--primary:#0E7C63;--primary-d:#0A5C4A;--accent:#D8EC3F;--navy:#122B33;--amber:#E8A93C;--gray:#9AA8A2}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',system-ui,sans-serif;background:var(--bg);color:var(--ink);width:390px;height:844px;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px}
.brand{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.brand .mark{width:30px;height:30px;border-radius:9px;background:var(--primary);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:15px}
.me{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 12px 5px 5px;font-size:13px;font-weight:700}
.me .av{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
main{flex:1;overflow-y:auto;padding:0 16px 16px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.hero{border:none;background:linear-gradient(145deg,#0E7C63,#0A5C4A);color:#fff;padding:20px 18px}
.hero .tag{font-size:11px;font-weight:800;letter-spacing:.1em;color:var(--accent)}
.hero .date{font-size:26px;font-weight:800;margin:6px 0 2px}
.hero .time{font-size:15px;opacity:.9}
.hero .place{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:14px;font-weight:700}
.hero .place small{font-weight:400;opacity:.8;text-decoration:underline}
.avrow{display:flex;align-items:center;margin-top:14px}
.avrow .av{width:30px;height:30px;border-radius:50%;border:2px solid #0A5C4A;background:#fff;color:var(--primary-d);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-right:-8px}
.avrow .n{margin-left:16px;font-size:13px;font-weight:700}
.seg{display:flex;gap:8px;margin-top:16px}
.seg button{flex:1;border:none;border-radius:12px;padding:12px 0;font-size:14px;font-weight:800;font-family:inherit;background:rgba(255,255,255,.14);color:#fff}
.seg .on{background:var(--accent);color:var(--navy)}
.wa{width:100%;border:none;border-radius:999px;padding:14px 0;font-size:15px;font-weight:800;font-family:inherit;background:var(--accent);color:var(--navy);margin:4px 0 16px;display:flex;align-items:center;justify-content:center;gap:8px}
h2{font-size:14px;color:var(--muted);margin:4px 4px 10px;font-weight:800}
.evrow{display:flex;align-items:center;gap:14px;padding:12px 4px;border-bottom:1px solid var(--line)}
.evrow:last-child{border-bottom:none}
.dt{width:48px;text-align:center;background:#EDF4F1;border-radius:10px;padding:6px 0}
.dt b{display:block;font-size:17px}
.dt span{font-size:11px;color:var(--muted)}
.evrow .info{flex:1}
.evrow .info b{font-size:14px;display:block}
.evrow .info span{font-size:12px;color:var(--muted)}
.chip{border-radius:999px;padding:6px 12px;font-size:12px;font-weight:800}
.chip.join{background:#E2F3EE;color:var(--primary-d)}
.chip.none{background:#EDF1EF;color:var(--muted)}
.match{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:10px 4px;border-bottom:1px solid var(--line)}
.match:last-child{border-bottom:none}
.match b{font-variant-numeric:tabular-nums;background:var(--navy);color:var(--accent);border-radius:8px;padding:4px 10px;font-size:14px}
.tabbar{display:flex;background:#fff;border-top:1px solid var(--line);padding:8px 6px 22px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--muted);text-decoration:none;font-weight:700}
.tab.on{color:var(--primary)}
.tab svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="mark">🏓</span>Chennai Pickleball</div>
  <div class="me"><span class="av">け</span>けんじ</div>
</header>
<main>
  <div class="card hero">
    <div class="tag">次回の活動日</div>
    <div class="date">7/26 (土)</div>
    <div class="time">6:30 – 9:00</div>
    <div class="place">📍 Marina Sports Arena <small>地図を開く</small></div>
    <div class="avrow">
      <span class="av">け</span><span class="av">ゆ</span><span class="av">さ</span><span class="av">ま</span><span class="av" style="background:#EDF4F1">+8</span>
      <span class="n">参加 12名</span>
    </div>
    <div class="seg">
      <button class="on">参加</button>
      <button>未定</button>
      <button>不参加</button>
    </div>
  </div>
  <button class="wa">💬 WhatsAppで告知を共有</button>

  <div class="card">
    <h2>今後の予定</h2>
    <div class="evrow">
      <div class="dt"><b>8/2</b><span>土</span></div>
      <div class="info"><b>Besant Nagar Court</b><span>7:00 – 9:30・参加 6名</span></div>
      <span class="chip join">参加</span>
    </div>
    <div class="evrow">
      <div class="dt"><b>8/9</b><span>土</span></div>
      <div class="info"><b>Marina Sports Arena</b><span>6:30 – 9:00・参加 3名</span></div>
      <span class="chip none">未回答</span>
    </div>
  </div>

  <div class="card">
    <h2>最近の試合</h2>
    <div class="match"><span>けんじ・ゆうた vs さとし・まい</span><b>11 - 8</b></div>
    <div class="match"><span>あき・とも vs けんじ・まい</span><b>9 - 11</b></div>
  </div>
</main>
<nav class="tabbar">
  <a class="tab on"><svg viewBox="0 0 24 24"><path d="M3 11 12 3l9 8"/><path d="M5 10v10h14V10"/></svg><span>ホーム</span></a>
  <a class="tab"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg><span>予定</span></a>
  <a class="tab"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="6"/><path d="M12 15v6"/></svg><span>スコア</span></a>
  <a class="tab"><svg viewBox="0 0 24 24"><path d="M8 4h8v5a4 4 0 0 1-8 0z"/><path d="M8 5H5a3 3 0 0 0 3.2 4M16 5h3a3 3 0 0 1-3.2 4M12 13v4M8 21h8M12 17v4"/></svg><span>大会</span></a>
  <a class="tab"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg><span>その他</span></a>
</nav>
</body>
</html>
